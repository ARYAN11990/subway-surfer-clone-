<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Subway Rush - Enhanced Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #1a1a2e;
            font-family: 'Arial Black', Arialg sans-serif;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        #gameCanvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }
        
        #ui-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }
        
        .ui-element {
            pointer-events: auto;
        }
        
        /* HUD Styles */
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        
        #pauseBtn {
        width: 50px;
        height: 50px;
        background: linear-gradient(180deg, rgba(0,0,0,0.7), rgba(0,0,0,0.9));
        border: 3px solid rgba(255,255,255,0.8);
        border-radius: 15px;
        color: white;
        font-size: 18px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.2s, box-shadow 0.2s;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        
        /* YE DO LINES IMPORTANT HAIN: */
        pointer-events: auto !important; 
        z-index: 1000; 
    }
        
        #pauseBtn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }
        
        #statsContainer {
            text-align: right;
            color: white;
        }
        
        #score {
            font-size: 42px;
            font-weight: bold;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.8), 0 0 20px rgba(255,215,0,0.3);
            background: linear-gradient(180deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        #coinDisplay {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 8px;
            font-size: 26px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
        }
        
        .coin-icon-hud {
            width: 30px;
            height: 30px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border-radius: 50%;
            border: 3px solid #B8860B;
            box-shadow: 0 0 10px rgba(255,215,0,0.5);
            animation: coinPulse 1s infinite alternate;
        }
        
        @keyframes coinPulse {
            from { box-shadow: 0 0 10px rgba(255,215,0,0.5); }
            to { box-shadow: 0 0 20px rgba(255,215,0,0.8); }
        }
        
        #distance {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 24px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
            background: rgba(0,0,0,0.5);
            padding: 8px 20px;
            border-radius: 20px;
        }
        
        /* Power-up Display */
        #powerUpContainer {
            position: absolute;
            top: 120px;
            right: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .power-up-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0,0,0,0.7);
            padding: 8px 15px;
            border-radius: 25px;
            border: 2px solid;
            animation: powerUpGlow 0.5s infinite alternate;
        }
        
        .power-up-indicator.jetpack {
            border-color: #FF6B6B;
            box-shadow: 0 0 15px rgba(255,107,107,0.5);
        }
        
        .power-up-indicator.magnet {
            border-color: #4ECDC4;
            box-shadow: 0 0 15px rgba(78,205,196,0.5);
        }
        
        .power-up-indicator.sneakers {
            border-color: #95E1D3;
            box-shadow: 0 0 15px rgba(149,225,211,0.5);
        }
        
        .power-up-indicator.hoverboard {
            border-color: #AA96DA;
            box-shadow: 0 0 15px rgba(170,150,218,0.5);
        }
        
        @keyframes powerUpGlow {
            from { opacity: 0.8; }
            to { opacity: 1; }
        }
        
        .power-up-icon {
            font-size: 24px;
        }
        
        .power-up-timer {
            width: 60px;
            height: 8px;
            background: rgba(255,255,255,0.3);
            border-radius: 4px;
            overflow: hidden;
        }
        
        .power-up-timer-fill {
            height: 100%;
            background: white;
            transition: width 0.1s linear;
        }
        
        /* Overlay Styles */
        /* Find this section in your CSS and update it */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            animation: fadeIn 0.3s ease-out;
            
            /* ADD THIS LINE BELOW: */
            pointer-events: auto;

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .menu-panel {
            background: linear-gradient(180deg, #2C3E50, #1a252f);
            border-radius: 25px;

            text-align: center;
            border: 4px solid #3498db;

            max-width: 95%;

            animation: slideUp 0.4s ease-out;

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .game-title {
            font-size: 48px;
            background: linear-gradient(180deg, #FFD700, #FF6B35);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            margin-bottom: 30px;
            letter-spacing: 3px;
            animation: titleBounce 2s infinite;
        }
        
        @keyframes titleBounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .menu-btn {
            width: 100%;
            padding: 18px 40px;
            font-size: 20px;
            font-weight: bold;
            border: none;

            cursor: pointer;
            margin: 10px 0;

            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;

            content: '';

            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }
        
        .menu-btn:hover::before {
            left: 100%;
        }
        
        .menu-btn:hover {

        }
        
        .menu-btn:active {
            transform: scale(0.98);
        }
        
        .btn-play {
            background: linear-gradient(180deg, #2ECC71, #27AE60);
            color: white;
            box-shadow: 0 6px 0 #1E8449, 0 10px 25px rgba(46,204,113,0.4);
        }
        
        .btn-play:active {
            box-shadow: 0 2px 0 #1E8449;
            transform: translateY(4px);
        }
        
        .btn-secondary {
            background: linear-gradient(180deg, #3498DB, #2980B9);
            color: white;
            box-shadow: 0 6px 0 #1F618D, 0 10px 25px rgba(52,152,219,0.4);
        }
        
        .btn-shop {
            background: linear-gradient(180deg, #F39C12, #E67E22);
            color: white;
            box-shadow: 0 6px 0 #D35400, 0 10px 25px rgba(243,156,18,0.4);
        }
        
        .btn-settings {
            background: linear-gradient(180deg, #9B59B6, #8E44AD);
            color: white;
            box-shadow: 0 6px 0 #6C3483, 0 10px 25px rgba(155,89,182,0.4);
        }
        
        /* Stats Display */
        .stat-row {
            display: flex;
            justify-content: space-between;
            color: white;
            font-size: 22px;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.15);
        }
        
        .stat-value {
            color: #FFD700;
            font-weight: bold;
        }
        
        .new-record {
            color: #FF6B35;
            animation: recordPulse 0.5s infinite alternate;
        }
        
        @keyframes recordPulse {
            from { transform: scale(1); text-shadow: 0 0 10px #FF6B35; }
            to { transform: scale(1.1); text-shadow: 0 0 20px #FF6B35; }

        .high-score-display {
            color: #aaa;
            font-size: 20px;
            margin-top: 25px;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
        }
        
        .total-coins-display {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: #FFD700;
            font-size: 24px;
            margin-top: 15px;
        }
        
        #instructions {
            color: rgba(255,255,255,0.8);
            font-size: 14px;
            margin-top: 25px;
            line-height: 1.8;
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 10px;
        }
        
        /* Shop Styles */
        .shop-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px 0;
            max-height: 300px;
            overflow-y: auto;
            padding: 10px;
        }
        
        .shop-item {
            background: linear-gradient(180deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .shop-item:hover {
            transform: scale(1.05);
            border-color: #FFD700;
            box-shadow: 0 0 20px rgba(255,215,0,0.3);
        }
        
        .shop-item.owned {
            border-color: #2ECC71;
            background: linear-gradient(180deg, rgba(46,204,113,0.2), rgba(46,204,113,0.1));
        }
        
        .shop-item-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
        
        .shop-item-name {
            color: white;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .shop-item-price {
            color: #FFD700;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        
        .shop-item-owned {
            color: #2ECC71;
            font-size: 14px;
        }
        
        .shop-item-count {
            color: #aaa;
            font-size: 12px;
            margin-top: 5px;
        }
        
        .shop-coins {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: #FFD700;
            font-size: 28px;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
        }
        
        .message-popup {
            position: fixed;
            top: 15%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 20px 40px;
            border-radius: 15px;
            font-size: 20px;
            z-index: 1000;
            animation: popIn 0.3s ease-out;
            border: 2px solid #FFD700;
        }
        
        .message-popup.error {
            border-color: #E74C3C;
            color: #E74C3C;
        }
        
        .message-popup.success {
            border-color: #2ECC71;
            color: #2ECC71;
        }
        
        @keyframes popIn {
            from { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
        
        /* Settings Styles */
        .settings-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            font-size: 18px;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .toggle-switch {
            width: 60px;
            height: 30px;
            background: #555;
            border-radius: 15px;
            position: relative;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .toggle-switch.active {
            background: #2ECC71;
        }
        
        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 26px;
            height: 26px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: left 0.3s;
        }
        
        .toggle-switch.active::after {
            left: 32px;
        }
        
        /* Speed lines effect */
        .speed-line {
            position: absolute;
            background: rgba(255,255,255,0.5);
            pointer-events: none;
        }
        
        /* Mobile responsive */
        @media (max-width: 480px) {
            .game-title { font-size: 36px; }
            .menu-panel { padding: 25px; }
            .menu-btn { padding: 14px 30px; font-size: 16px; }
            #score { font-size: 32px; }
            .shop-grid { grid-template-columns: repeat(2, 1fr); }
        }


        /* powerups show in game and also with keyboard use  */
        /* ACTIVE ITEM BUTTONS (Bottom Right) */
        #activeItems {
            position: absolute;
            bottom: 5px;
            right: 20px;
            display: flex;
            flex-direction: column; /* Buttons ek ke upar ek honge */
            gap: 15px;
            pointer-events: auto; /* Clickable banata hai */
        }

        .item-btn {
            width: 60px;
            height: 60px;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.1s;
            position: relative;
        }

        .item-btn:active {
            transform: scale(0.9);
            background: rgba(255, 255, 255, 0.2);
        }

        .item-btn-icon {
            font-size: 24px;
        }

        .item-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #FFD700;
            color: black;
            font-weight: bold;
            font-size: 12px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #fff;
        }
        
        .item-key {
            position: absolute;
            bottom: -20px;
            color: white;
            font-size: 10px;
            background: rgba(0,0,0,0.5);
            padding: 2px 6px;
            border-radius: 4px;
        }
    </style>
